services:
  fardin_portfolio_postgres:
    image: postgres:15-alpine
    container_name: fardin_portfolio_postgres
    restart: always
    profiles:
      - dev
      - prod
    env_file:
      - .env
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - fardin_portfolio_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app_prod:
    image: ${DOCKER_USERNAME}/${PACKAGE_NAME}:${PACKAGE_VERSION}
    container_name: fardin_portfolio_app
    restart: always
    profiles:
      - prod
    ports:
      - "${PORT:-5069}:3000"
    env_file:
      - .env
    depends_on:
      fardin_portfolio_postgres:
        condition: service_healthy
    networks:
      - fardin_portfolio_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  fardin_portfolio_network:
    driver: bridge

volumes:
  fardin_portfolio_postgres:
