name: Lint, Format, Build, Push & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches:
      - '**'

env:
  DOCKER_IMAGE_NAME: fardin-rahman-portfolio-server
  DOCKER_REGISTRY: docker.io

jobs:
  ci-check:
    name: Lint, Format, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CI Check
        run: pnpm run ci:fix

      - name: Build Project
        run: pnpm build

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: ci-check
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.PACKAGE_NAME }}:${{ secrets.PACKAGE_VERSION }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ secrets.PACKAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ secrets.PACKAGE_NAME }}:buildcache,mode=max
          platforms: linux/amd64

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Copy Compose File
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          source: 'compose.yaml'
          target: '/home/${{ secrets.VPS_USER }}/apps/fardin-rahman-portfolio-server'

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            cd ~/apps/fardin-rahman-portfolio-server
            
            # Check if Cloudflare tunnel is running
            if ! systemctl is-active --quiet cloudflared; then
              echo "⚠️  Cloudflare tunnel is not running. Starting it..."
              sudo systemctl start cloudflared
              sleep 5
              
              # Verify it started successfully
              if ! systemctl is-active --quiet cloudflared; then
                echo "❌ Failed to start Cloudflare tunnel. Deployment aborted."
                exit 1
              fi
              echo "✅ Cloudflare tunnel started successfully"
            else
              echo "✅ Cloudflare tunnel is already running"
            fi
            
            # Set environment variables for docker compose
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            export PACKAGE_NAME=${{ secrets.PACKAGE_NAME }}
            export PACKAGE_VERSION=${{ secrets.PACKAGE_VERSION }}
            
            # Pull the latest image
            echo "📥 Pulling latest Docker image..."
            sudo docker compose --profile prod pull
            
            # Stop and remove old containers
            echo "🛑 Stopping old containers..."
            sudo docker compose --profile prod down --remove-orphans
            
            # Start new containers
            echo "🚀 Starting new containers..."
            sudo docker compose --profile prod up -d
            
            # Wait for services to be healthy
            echo "⏳ Waiting for services to be healthy..."
            sleep 30
            
            # Check if containers are running
            if sudo docker compose --profile prod ps | grep -q "Up"; then
              echo "✅ Deployment successful!"
              
              # Show running containers
              sudo docker compose --profile prod ps
              
              # Clean up old images and containers
              echo "🧹 Cleaning up..."
              sudo docker system prune -f
            else
              echo "❌ Deployment failed. Containers are not running."
              sudo docker compose --profile prod logs
              exit 1
            fi
